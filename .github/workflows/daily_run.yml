name: Monitor Politico Diario

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install -r requirements.txt

      - name: Ejecutar Robot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python main.py

      - name: Guardar resultados en el repositorio
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Observatorio Bot"
          git add data/*.json
          git commit -m "Actualizacion diaria: $(date +'%Y-%m-%d')" || echo "Sin cambios nuevos"
          git push
