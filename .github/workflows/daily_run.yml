name: Monitor Politico Diario

on:
  schedule:
    - cron: '0 23 * * *' # Corre todos los días a las 20:00 hs Argentina
  workflow_dispatch:

permissions:           # ✅ AGREGADO: necesario para poder hacer push
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install -r requirements.txt

      - name: Ejecutar Robot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python main.py

      - name: Guardar resultados en el repositorio
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Observatorio Bot"
          git add data/                          # ✅ carpeta entera, no glob del shell
          git diff --staged --quiet || git commit -m "Actualizacion diaria: $(date +'%Y-%m-%d')"
          git push
